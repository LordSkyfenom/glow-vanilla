<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Форум — Glow Vanilla</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        /* ===== СТИЛИ ДЛЯ ФОРУМА ===== */
        .forum-layout {
            display: flex;
            gap: 30px;
            padding: 40px 0;
            min-height: 70vh;
        }
        .forum-sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
            position: sticky;
            top: 100px;
            padding: 12px 0;
        }
        .forum-sidebar::-webkit-scrollbar { width: 4px; }
        .forum-sidebar::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            color: var(--gray);
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover {
            color: var(--white);
            background: rgba(255,255,255,0.04);
        }
        .sidebar-item.active {
            color: var(--green);
            border-left-color: var(--green);
            background: rgba(0,255,136,0.06);
        }
        .sidebar-item .icon { font-size: 20px; width: 28px; text-align: center; }
        .sidebar-item .badge {
            margin-left: auto;
            background: var(--purple);
            color: white;
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .sidebar-divider {
            height: 1px;
            background: rgba(255,255,255,0.05);
            margin: 8px 20px;
        }
        .sub-list {
            padding-left: 20px;
        }
        .sub-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            color: var(--gray);
            font-size: 14px;
            transition: 0.3s;
            cursor: pointer;
            border-radius: 8px;
            margin: 2px 8px;
        }
        .sub-item:hover {
            color: var(--white);
            background: rgba(255,255,255,0.04);
        }
        .sub-item.active {
            color: var(--green);
            background: rgba(0,255,136,0.06);
        }
        .sub-item .sub-icon { font-size: 16px; width: 24px; text-align: center; }
        .sub-item .sub-badge {
            margin-left: auto;
            font-size: 12px;
            color: var(--gray);
        }
        .sub-action {
            padding: 6px 16px;
            margin: 4px 8px;
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 8px;
            color: var(--gray);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .sub-action:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .forum-main {
            flex: 1;
            min-width: 0;
        }
        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .forum-header__title {
            font-size: 28px;
            font-weight: 800;
            color: var(--white);
        }
        .forum-header__actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .btn-green {
            background: var(--green);
            color: var(--bg);
        }
        .btn-green:hover {
            background: #00cc77;
            transform: scale(1.03);
        }
        .btn-purple {
            background: var(--purple);
            color: white;
        }
        .btn-purple:hover {
            background: #7c4de0;
            transform: scale(1.03);
        }
        .btn-red {
            background: #E94560;
            color: white;
        }
        .btn-red:hover {
            background: #c73b52;
        }
        .btn-gray {
            background: rgba(255,255,255,0.08);
            color: var(--gray);
        }
        .btn-gray:hover {
            background: rgba(255,255,255,0.15);
        }
        .btn-discord {
            background: #5865F2;
            color: white;
        }
        .btn-discord:hover {
            background: #4752c4;
        }
        .post-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .post-card:hover { border-color: var(--purple); }
        .post-card__header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
        }
        .post-card__avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .post-card__author { font-weight: 700; }
        .post-card__date {
            color: var(--gray);
            font-size: 13px;
            margin-left: auto;
        }
        .post-card__title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .post-card__text { color: var(--gray); font-size: 15px; line-height: 1.6; }
        .post-card__badge {
            background: var(--purple);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 8px;
        }
        .post-card__badge.news { background: #E94560; }
        .post-card__actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chat-window {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            min-height: 500px;
            max-height: 70vh;
        }
        .chat-window__header {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .chat-window__header .status {
            font-size: 13px;
            font-weight: 400;
            color: var(--green);
        }
        .chat-window__messages {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-window__messages::-webkit-scrollbar { width: 4px; }
        .chat-window__messages::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }
        .message {
            max-width: 75%;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message--self {
            background: var(--green);
            color: var(--bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message--other {
            background: rgba(255,255,255,0.08);
            color: var(--white);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message__time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 2px;
            display: block;
        }
        .message--self .message__time { text-align: right; }
        .message--other .message__time { text-align: left; }
        .chat-window__input {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .chat-window__input input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg);
            color: var(--white);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }
        .chat-window__input input:focus {
            outline: none;
            border-color: var(--green);
        }
        .chat-window__input button {
            padding: 10px 24px;
            border-radius: 12px;
            border: none;
            background: var(--green);
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .chat-window__input button:hover { background: #00cc77; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .modal__title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--white);
        }
        .modal__label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--gray);
        }
        .modal__input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg);
            color: var(--white);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        .modal__input:focus {
            outline: none;
            border-color: var(--green);
        }
        .modal__actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal__btn {
            padding: 10px 28px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }
        .modal__btn-primary {
            background: var(--green);
            color: var(--bg);
        }
        .modal__btn-primary:hover { background: #00cc77; }
        .modal__btn-secondary {
            background: transparent;
            color: var(--gray);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal__btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .user-info__avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
        }
        .user-info__name {
            font-weight: 600;
            font-size: 14px;
        }
        .user-info__logout {
            margin-left: auto;
            color: var(--gray);
            text-decoration: none;
            font-size: 13px;
        }
        .user-info__logout:hover {
            color: #E94560;
        }
        /* ===== МОБИЛЬНАЯ ОПТИМИЗАЦИЯ ===== */
        @media (max-width: 768px) {
            .forum-layout {
                flex-direction: column;
                padding: 12px 0;
                gap: 12px;
            }
            .forum-sidebar {
                width: 100%;
                max-height: 200px;
                position: static;
                padding: 6px 0;
                border-radius: 12px;
            }
            .forum-sidebar .sidebar-item {
                padding: 6px 12px;
                font-size: 13px;
                gap: 8px;
            }
            .forum-sidebar .sidebar-item .icon {
                font-size: 16px;
                width: 22px;
            }
            .forum-sidebar .sub-item {
                padding: 4px 10px;
                font-size: 12px;
                margin: 1px 4px;
            }
            .forum-sidebar .sub-action {
                padding: 3px 10px;
                font-size: 11px;
                margin: 2px 4px;
            }
            .forum-sidebar .badge {
                font-size: 10px;
                padding: 0 6px;
            }
            .forum-main {
                padding: 0 2px;
            }
            .forum-header {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
                margin-bottom: 12px;
            }
            .forum-header__title {
                font-size: 20px;
                text-align: center;
            }
            .forum-header__actions {
                justify-content: center;
                flex-wrap: wrap;
            }
            .forum-header__actions .btn {
                width: 100%;
                text-align: center;
                padding: 8px 12px;
                font-size: 13px;
            }
            .post-card {
                padding: 14px;
                margin-bottom: 10px;
                border-radius: 12px;
            }
            .post-card__header {
                flex-wrap: wrap;
                gap: 6px;
            }
            .post-card__avatar {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
            .post-card__author {
                font-size: 13px;
            }
            .post-card__date {
                font-size: 10px;
                margin-left: 0;
                width: 100%;
            }
            .post-card__title {
                font-size: 15px;
            }
            .post-card__text {
                font-size: 13px;
            }
            .post-card__badge {
                font-size: 10px;
                padding: 1px 8px;
            }
            .post-card__actions {
                flex-direction: column;
                gap: 4px;
            }
            .post-card__actions .btn {
                width: 100%;
                text-align: center;
                padding: 6px 12px;
                font-size: 12px;
            }
            .chat-window {
                min-height: 300px;
                max-height: 55vh;
                border-radius: 12px;
            }
            .chat-window__header {
                padding: 8px 12px;
                font-size: 14px;
                flex-wrap: wrap;
                gap: 6px;
            }
            .chat-window__header .status {
                font-size: 11px;
            }
            .chat-window__messages {
                padding: 10px 12px;
            }
            .message {
                max-width: 90%;
                font-size: 13px;
                padding: 6px 10px;
            }
            .message__time {
                font-size: 9px;
            }
            .chat-window__input {
                flex-direction: column;
                padding: 8px 12px;
                gap: 6px;
            }
            .chat-window__input input {
                font-size: 13px;
                padding: 8px 10px;
            }
            .chat-window__input button {
                width: 100%;
                padding: 8px;
                font-size: 13px;
            }
            .modal {
                padding: 16px;
                margin: 10px;
                max-width: 100%;
                border-radius: 16px;
            }
            .modal__title {
                font-size: 18px;
                margin-bottom: 12px;
            }
            .modal__input {
                font-size: 14px;
                padding: 8px 10px;
            }
            .modal__actions {
                flex-direction: column;
                gap: 6px;
            }
            .modal__btn {
                width: 100%;
                text-align: center;
                padding: 8px;
                font-size: 14px;
            }
            .user-info {
                padding: 8px 12px;
                gap: 8px;
                flex-wrap: wrap;
            }
            .user-info__avatar {
                width: 28px;
                height: 28px;
            }
            .user-info__name {
                font-size: 12px;
            }
            .user-info__logout {
                font-size: 12px;
            }
        }
        @media (max-width: 480px) {
            .forum-sidebar {
                max-height: 160px;
            }
            .forum-sidebar .sidebar-item {
                padding: 4px 10px;
                font-size: 12px;
            }
            .forum-header__title {
                font-size: 18px;
            }
            .post-card {
                padding: 10px;
            }
            .post-card__title {
                font-size: 14px;
            }
            .post-card__text {
                font-size: 12px;
            }
            .chat-window {
                min-height: 250px;
                max-height: 50vh;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ХЕДЕР ===== -->
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">GLOW VANILLA</a>
            <nav class="nav">
                <a href="index.html" class="nav__link">Главная</a>
                <a href="index.html#donate" class="nav__link">Донат</a>
                <a href="index.html#about" class="nav__link">О нас</a>
                <a href="forum.html" class="nav__link active">Форум</a>
            </nav>
            <a href="profile.html" class="profile-icon" title="Профиль">
                <img src="assets/images/default-avatar.png" alt="Профиль" id="headerAvatar" />
            </a>
        </div>
    </header>

    <!-- ===== ФОРУМ ===== -->
    <section style="padding-top: 20px;">
        <div class="container">
            <div class="forum-layout">

                <!-- ЛЕВАЯ ПАНЕЛЬ -->
                <aside class="forum-sidebar" id="sidebar">
                    <div class="sidebar-item active" data-section="news">
                        <span class="icon">📰</span> Новости
                    </div>

                    <div class="sidebar-item" data-section="cities">
                        <span class="icon">🏙️</span> Города
                        <span class="badge" id="cityBadge">0</span>
                    </div>
                    <div id="cityList" class="sub-list" style="display:none;">
                        <div class="sub-action" onclick="openModal('city')">➕ Создать город</div>
                    </div>

                    <div class="sidebar-item" data-section="general">
                        <span class="icon">💬</span> Общий форум
                    </div>

                    <div class="sidebar-item" data-section="friends">
                        <span class="icon">👥</span> Друзья
                        <span class="badge" id="friendBadge">0</span>
                    </div>
                    <div id="friendList" class="sub-list" style="display:none;">
                        <div class="sub-action" onclick="addFriend()">➕ Добавить друга</div>
                    </div>

                    <div class="sidebar-divider"></div>

                    <div class="sidebar-item" data-section="chats">
                        <span class="icon">💬</span> Чаты
                        <span class="badge" id="chatBadge">0</span>
                    </div>
                    <div id="chatList" class="sub-list" style="display:none;"></div>

                    <!-- ИНФОРМАЦИЯ О ПОЛЬЗОВАТЕЛЕ -->
                    <div class="user-info" id="userInfo">
                        <img class="user-info__avatar" id="userAvatar" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Avatar" />
                        <span class="user-info__name" id="userName">Не авторизован</span>
                        <a class="user-info__logout" id="authBtn" href="/auth/discord">Войти</a>
                    </div>
                </aside>

                <!-- ОСНОВНАЯ ОБЛАСТЬ -->
                <main class="forum-main">
                    <div class="forum-header">
                        <h2 class="forum-header__title" id="sectionTitle">📰 Новости</h2>
                        <div class="forum-header__actions" id="sectionActions"></div>
                    </div>
                    <div id="sectionContent"></div>
                </main>

            </div>
        </div>
    </section>

    <!-- ===== МОДАЛКА ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 class="modal__title" id="modalTitle">Создать</h3>
            <label class="modal__label" id="modalLabel">Имя</label>
            <input class="modal__input" id="modalInput" placeholder="Введите имя..." />
            <div class="modal__actions">
                <button class="modal__btn modal__btn-secondary" id="modalCloseBtn">Отмена</button>
                <button class="modal__btn modal__btn-primary" id="modalSaveBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- ===== ФУТЕР ===== -->
    <footer class="footer">
        <div class="container footer__inner">
            <p class="footer__ip">mc.glowvanilla.ru</p>
            <div class="footer__socials">
                <a href="https://discord.gg/glow-vanilla" target="_blank" class="footer__social">Discord</a>
            </div>
            <p class="footer__copy">© 2026 Glow Vanilla</p>
        </div>
    </footer>

    <script>
        // ============================================================
        // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ
        // ============================================================
        let currentUser = null;
        let currentSection = 'news';
        let currentChatId = null;
        let posts = { news: [], general: [] };
        let cities = [];
        let friends = [];
        let chats = [];

        // ============================================================
        // ЗАГРУЗКА ПОЛЬЗОВАТЕЛЯ
        // ============================================================
        async function loadUser() {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('userName').textContent = currentUser.username;
                    document.getElementById('userAvatar').src = `https://cdn.discordapp.com/avatars/${currentUser.id}/${currentUser.avatar}.png`;
                    document.getElementById('authBtn').textContent = 'Выйти';
                    document.getElementById('authBtn').href = '/auth/logout';
                } else {
                    currentUser = null;
                    document.getElementById('userName').textContent = 'Не авторизован';
                    document.getElementById('userAvatar').src = 'https://cdn.discordapp.com/embed/avatars/0.png';
                    document.getElementById('authBtn').textContent = 'Войти';
                    document.getElementById('authBtn').href = '/auth/discord';
                }
            } catch (e) {
                currentUser = null;
            }
            renderAll();
        }

        // ============================================================
        // API ЗАПРОСЫ
        // ============================================================
        async function apiGet(url) {
            const res = await fetch(url);
            return res.json();
        }

        async function apiPost(url, data) {
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'Ошибка');
            }
            return res.json();
        }

        async function apiDelete(url) {
            const res = await fetch(url, { method: 'DELETE' });
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.error || 'Ошибка');
            }
            return res.json();
        }

        // ============================================================
        // ЗАГРУЗКА ДАННЫХ
        // ============================================================
        async function loadData() {
            try {
                const allPosts = await apiGet('/api/posts');
                posts.news = allPosts.filter(p => p.section === 'news');
                posts.general = allPosts.filter(p => p.section === 'general' || p.section === 'general');

                cities = await apiGet('/api/cities');

                if (currentUser) {
                    friends = await apiGet('/api/friends');
                } else {
                    friends = [];
                }

                chats = [];
                if (currentUser) {
                    cities.forEach(c => {
                        if (c.members && c.members.includes(currentUser.id)) {
                            chats.push({ id: `city_${c.id}`, name: c.name, type: 'city' });
                        }
                    });
                    friends.forEach(f => {
                        chats.push({ id: `private_${f.friend_id}`, name: f.username, type: 'private' });
                    });
                }

                renderAll();
            } catch (e) {
                console.error('Ошибка загрузки данных:', e);
            }
        }

        // ============================================================
        // РЕНДЕРИНГ
        // ============================================================
        function renderAll() {
            renderSidebar();
            renderContent(currentSection);
        }

        function renderSidebar() {
            const cityList = document.getElementById('cityList');
            const cityBadge = document.getElementById('cityBadge');
            cityBadge.textContent = cities.length;
            cityList.innerHTML = `
                ${cities.map(c => `
                    <div class="sub-item" onclick="openCity('${c.id}')">
                        <span class="sub-icon">🏙️</span> ${c.name}
                        <span class="sub-badge">${c.members ? c.members.length : 0} 👥</span>
                    </div>
                `).join('')}
                ${currentUser ? `<div class="sub-action" onclick="openModal('city')">➕ Создать город</div>` : ''}
            `;

            const friendList = document.getElementById('friendList');
            const friendBadge = document.getElementById('friendBadge');
            friendBadge.textContent = friends.length;
            friendList.innerHTML = `
                ${friends.map(f => `
                    <div class="sub-item friend-item" onclick="openFriendChat('${f.friend_id}')" data-friend-id="${f.friend_id}">
                        <span class="sub-icon">👤</span> ${f.username}
                        <span class="sub-badge friend-status" style="color:var(--gray);">🔄 загрузка...</span>
                        <span class="sub-badge" style="cursor:pointer;color:#E94560;" onclick="event.stopPropagation();removeFriend('${f.friend_id}')">✕</span>
                    </div>
                `).join('')}
                ${currentUser ? `<div class="sub-action" onclick="addFriend()">➕ Добавить друга</div>` : ''}
            `;

            const chatList = document.getElementById('chatList');
            const chatBadge = document.getElementById('chatBadge');
            chatBadge.textContent = chats.length;
            chatList.innerHTML = chats.length ? chats.map(c => `
                <div class="sub-item" onclick="${c.type === 'city' ? `openCityChat('${c.id.replace('city_', '')}')` : `openFriendChat('${c.id.replace('private_', '')}')`}">
                    <span class="sub-icon">${c.type === 'city' ? '🏙️' : '👤'}</span> ${c.name}
                </div>
            `).join('') : '<div style="padding:8px 16px;color:var(--gray);font-size:13px;">Нет активных чатов</div>';

            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.toggle('active', el.dataset.section === currentSection);
            });

            document.getElementById('cityList').style.display = currentSection === 'cities' ? 'block' : 'none';
            document.getElementById('friendList').style.display = currentSection === 'friends' ? 'block' : 'none';
            document.getElementById('chatList').style.display = currentSection === 'chats' ? 'block' : 'none';
        }

        function renderContent(section) {
            const title = document.getElementById('sectionTitle');
            const container = document.getElementById('sectionContent');
            const actions = document.getElementById('sectionActions');

            const chatWindow = document.querySelector('.chat-window');
            if (chatWindow) chatWindow.remove();

            if (!currentUser && section !== 'news') {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔐</div>
                        <h3>Требуется авторизация</h3>
                        <p style="margin-bottom:16px;">Войдите через Discord, чтобы использовать форум</p>
                        <a href="/auth/discord" class="btn btn-discord">Войти через Discord</a>
                    </div>
                `;
                actions.innerHTML = '';
                return;
            }

            switch(section) {
                case 'news':
                    title.textContent = '📰 Новости';
                    actions.innerHTML = currentUser && currentUser.isAdmin 
                        ? `<button class="btn btn-green" onclick="createNews()">+ Создать новость</button>` 
                        : '';
                    container.innerHTML = posts.news.length ? posts.news.map(p => `
                        <div class="post-card" id="post-${p.id}">
                            <div class="post-card__header">
                                <div class="post-card__avatar">${p.author.charAt(0)}</div>
                                <span class="post-card__author">${p.author}</span>
                                <span class="post-card__date">${new Date(p.created_at).toLocaleDateString()}</span>
                                ${currentUser && currentUser.isAdmin ? `
                                    <button class="btn btn-red" style="padding:4px 12px; font-size:12px; margin-left:auto;" onclick="deleteNews(${p.id})">🗑️</button>
                                ` : ''}
                            </div>
                            <span class="post-card__badge news">Новость</span>
                            <div class="post-card__title">${p.title}</div>
                            <div class="post-card__text">${p.content}</div>
                        </div>
                    `).join('') : '<div class="empty-state"><div class="icon">📰</div>Новостей пока нет</div>';
                    break;

                case 'general':
                    title.textContent = '💬 Общий форум';
                    actions.innerHTML = currentUser ? `<button class="btn btn-green" onclick="createGeneralPost()">+ Создать пост</button>` : '';
                    container.innerHTML = posts.general.length ? posts.general.map(p => `
                        <div class="post-card">
                            <div class="post-card__header">
                                <div class="post-card__avatar">${p.author.charAt(0)}</div>
                                <span class="post-card__author">${p.author}</span>
                                <span class="post-card__date">${new Date(p.created_at).toLocaleDateString()}</span>
                            </div>
                            <span class="post-card__badge">Общее</span>
                            <div class="post-card__title">${p.title}</div>
                            <div class="post-card__text">${p.content}</div>
                        </div>
                    `).join('') : '<div class="empty-state"><div class="icon">💬</div>Постов пока нет. Будьте первым!</div>';
                    break;

                case 'cities':
                    title.textContent = '🏙️ Города';
                    actions.innerHTML = currentUser ? `<button class="btn btn-purple" onclick="openModal('city')">+ Создать город</button>` : '';
                    container.innerHTML = cities.length ? cities.map(c => {
                        const isMember = c.members && c.members.includes(currentUser?.id);
                        const isOwner = c.owner === currentUser?.id;
                        const hasRequest = c.requests && c.requests.includes(currentUser?.id);
                        const requestsCount = c.requests ? c.requests.length : 0;

                        return `
                            <div class="post-card">
                                <div class="post-card__header">
                                    <span style="font-size:24px;">🏙️</span>
                                    <span class="post-card__author">${c.name}</span>
                                    <span class="post-card__date">${c.members ? c.members.length : 0} участников</span>
                                </div>
                                <div style="color:var(--gray);font-size:14px;margin-bottom:12px;">
                                    👑 Владелец: ${c.owner_name || c.owner || 'Unknown'}
                                </div>
                                <div class="post-card__actions">
                                    ${isMember ? 
                                        `<button class="btn btn-green" onclick="openCityChat('${c.id}')">💬 Чат</button>` :
                                        hasRequest ?
                                            `<button class="btn btn-gray" disabled>⏳ Заявка отправлена</button>` :
                                            `<button class="btn btn-purple" onclick="sendRequest(${c.id})">📩 Подать заявку</button>`
                                    }
                                    ${isOwner && requestsCount > 0 ? `
                                        <button class="btn btn-green" onclick="manageRequests(${c.id})">📩 Заявки (${requestsCount})</button>
                                    ` : ''}
                                    ${isMember && !isOwner ? `
                                        <button class="btn btn-red" onclick="leaveCity(${c.id})">🚪 Покинуть</button>
                                    ` : ''}
                                    ${isOwner ? `
                                        <button class="btn btn-red" onclick="deleteCity(${c.id})">🗑️ Удалить город</button>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    }).join('') : '<div class="empty-state"><div class="icon">🏙️</div>Городов пока нет</div>';
                    break;

                case 'friends':
                    title.textContent = '👥 Друзья';
                    actions.innerHTML = currentUser ? `<button class="btn btn-purple" onclick="addFriend()">+ Добавить друга</button>` : '';
                    container.innerHTML = friends.length ? friends.map(f => `
                        <div class="post-card friend-item" onclick="openFriendChat('${f.friend_id}')" style="cursor:pointer;" data-friend-id="${f.friend_id}">
                            <div class="post-card__header">
                                <div class="post-card__avatar">${f.username.charAt(0)}</div>
                                <span class="post-card__author">${f.username}</span>
                                <span class="post-card__date friend-status" style="color:var(--gray);">🔄 загрузка...</span>
                                <button class="btn btn-red" style="padding:4px 12px;font-size:12px;margin-left:auto;" onclick="event.stopPropagation();removeFriend('${f.friend_id}')">✕</button>
                            </div>
                        </div>
                    `).join('') : '<div class="empty-state"><div class="icon">👥</div>У вас пока нет друзей</div>';
                    break;

                case 'chats':
                    title.textContent = '💬 Чаты';
                    actions.innerHTML = '';
                    container.innerHTML = chats.length ? chats.map(c => `
                        <div class="post-card" onclick="${c.type === 'city' ? `openCityChat('${c.id.replace('city_', '')}')` : `openFriendChat('${c.id.replace('private_', '')}')`}" style="cursor:pointer;">
                            <div class="post-card__header">
                                <span style="font-size:24px;">${c.type === 'city' ? '🏙️' : '👤'}</span>
                                <span class="post-card__author">${c.name}</span>
                                <span class="post-card__date">${c.type === 'city' ? 'городской чат' : 'личный чат'}</span>
                            </div>
                        </div>
                    `).join('') : '<div class="empty-state"><div class="icon">💬</div>Нет активных чатов</div>';
                    break;
            }
        }

        // ============================================================
        // НОВОСТИ
        // ============================================================
        async function createNews() {
            if (!currentUser || !currentUser.isAdmin) {
                alert('⛔ Только администратор может создавать новости!');
                return;
            }
            const title = prompt('📰 Заголовок новости:');
            if (!title) return;
            const content = prompt('📝 Текст новости:');
            if (!content) return;

            try {
                await apiPost('/api/news', { title, content });
                await loadData();
                renderContent('news');
                alert('✅ Новость создана!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        async function deleteNews(postId) {
            if (!currentUser || !currentUser.isAdmin) {
                alert('⛔ Только администратор может удалять новости!');
                return;
            }
            if (!confirm('🗑️ Удалить эту новость?')) return;

            try {
                await apiDelete(`/api/news/${postId}`);
                posts.news = posts.news.filter(p => p.id !== postId);
                renderContent('news');
                alert('✅ Новость удалена!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        // ============================================================
        // ПОСТЫ
        // ============================================================
        async function createGeneralPost() {
            if (!currentUser) {
                alert('⛔ Требуется авторизация!');
                return;
            }
            const title = prompt('Заголовок:');
            if (!title) return;
            const content = prompt('Текст:');
            if (!content) return;

            try {
                await apiPost('/api/posts', { title, content, section: 'general' });
                await loadData();
                renderContent('general');
                alert('✅ Пост создан!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        // ============================================================
        // ГОРОДА
        // ============================================================
        async function deleteCity(cityId) {
            if (!confirm('🗑️ Удалить город? Это действие нельзя отменить!')) return;

            try {
                await apiDelete(`/api/cities/${cityId}`);
                await loadData();
                renderContent('cities');
                alert('✅ Город удалён!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        async function sendRequest(cityId) {
            try {
                await apiPost(`/api/cities/${cityId}/request`, {});
                await loadData();
                renderContent('cities');
                alert('✅ Заявка отправлена!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        async function manageRequests(cityId) {
            const city = cities.find(c => c.id === cityId);
            if (!city || !city.requests || city.requests.length === 0) {
                alert('Нет заявок');
                return;
            }

            const names = await Promise.all(city.requests.map(async (id) => {
                try {
                    const res = await fetch(`/api/users/${id}`);
                    if (res.ok) {
                        const data = await res.json();
                        return data.username;
                    }
                    return id;
                } catch { return id; }
            }));

            const list = names.map((name, i) => `${i+1}. ${name}`).join('\n');
            const choice = prompt(`Заявки в город "${city.name}":\n\n${list}\n\nВведите номер для принятия:`);
            if (!choice) return;

            const idx = parseInt(choice) - 1;
            if (idx < 0 || idx >= city.requests.length) {
                alert('❌ Неверный номер');
                return;
            }

            try {
                await apiPost(`/api/cities/${cityId}/accept`, { applicantId: city.requests[idx] });
                await loadData();
                renderContent('cities');
                alert('✅ Заявка принята!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        async function leaveCity(cityId) {
            if (!confirm('🚪 Покинуть город?')) return;

            try {
                const res = await fetch(`/api/cities/${cityId}/leave`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Ошибка');
                }

                await loadData();
                
                if (currentChatId === `city_${cityId}`) {
                    currentChatId = null;
                }

                renderContent('cities');
                alert('✅ Вы покинули город!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        function openCity(cityId) {
            currentSection = 'cities';
            renderAll();
            setTimeout(() => {
                const cards = document.querySelectorAll('.post-card');
                const city = cities.find(c => c.id === cityId);
                if (city) {
                    const idx = cities.indexOf(city);
                    if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // ============================================================
        // ЧАТЫ
        // ============================================================
        async function loadMessages(chatId) {
            try {
                const res = await fetch(`/api/messages/${encodeURIComponent(chatId)}`);
                if (!res.ok) throw new Error('Ошибка загрузки');
                return await res.json();
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        async function sendMessage(chatId, content, type) {
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chatId, content, type })
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Ошибка');
                }
                return await res.json();
            } catch (e) {
                alert('❌ ' + e.message);
                return null;
            }
        }

        // ============================================================
        // УДАЛЕНИЕ СООБЩЕНИЯ
        // ============================================================
        async function deleteMessage(messageId) {
            if (!confirm('🗑️ Удалить это сообщение?')) return;

            try {
                const res = await fetch(`/api/messages/${messageId}`, {
                    method: 'DELETE'
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.error || 'Ошибка');
                }

                if (currentChatId) {
                    loadMessages(currentChatId).then(msgs => {
                        const msgsContainer = document.getElementById('chatMessages');
                        if (msgsContainer) {
                            msgsContainer.innerHTML = msgs.map(m => {
                                const canDelete = currentUser && (m.sender_id === currentUser.id || currentUser.isAdmin);
                                return `
                                    <div class="message ${m.sender_id === currentUser?.id ? 'message--self' : 'message--other'}" data-message-id="${m.id}">
                                        ${m.sender_id !== currentUser?.id ? `<strong>${m.username || 'Unknown'}</strong><br/>` : ''}
                                        ${m.content}
                                        <span class="message__time">${new Date(m.created_at).toLocaleTimeString()}</span>
                                        ${canDelete ? `<button class="btn btn-red" style="padding:2px 8px;font-size:11px;margin-left:8px;" onclick="deleteMessage(${m.id})">🗑️</button>` : ''}
                                    </div>
                                `;
                            }).join('');
                            msgsContainer.scrollTop = msgsContainer.scrollHeight;
                        }
                    });
                }

                alert('✅ Сообщение удалено!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        function renderChatWindow(chatId, name, type) {
            const container = document.getElementById('sectionContent');
            const title = document.getElementById('sectionTitle');
            const actions = document.getElementById('sectionActions');

            actions.innerHTML = '';
            title.textContent = `💬 ${name}`;

            container.innerHTML = `
                <div class="chat-window">
                    <div class="chat-window__header">
                        <span>💬 ${name}</span>
                        <span class="status">${type === 'city' ? 'городской чат' : 'личный чат'}</span>
                        ${type === 'city' ? `<button class="btn btn-red" style="margin-left:auto;padding:4px 12px;font-size:12px;" onclick="leaveCity('${chatId.replace('city_', '')}')">🚪 Покинуть</button>` : ''}
                    </div>
                    <div class="chat-window__messages" id="chatMessages">
                        <div style="text-align:center;padding:20px;color:var(--gray);">Загрузка сообщений...</div>
                    </div>
                    <div class="chat-window__input">
                        <input id="chatInput" placeholder="Введите сообщение..." />
                        <button onclick="sendChatMessage()">Отправить</button>
                    </div>
                </div>
            `;

            loadMessages(chatId).then(msgs => {
                const msgsContainer = document.getElementById('chatMessages');
                if (msgs.length === 0) {
                    msgsContainer.innerHTML = '<div style="text-align:center;padding:20px;color:var(--gray);">Напишите первое сообщение!</div>';
                    return;
                }
                msgsContainer.innerHTML = msgs.map(m => {
                    const canDelete = currentUser && (m.sender_id === currentUser.id || currentUser.isAdmin);
                    return `
                        <div class="message ${m.sender_id === currentUser?.id ? 'message--self' : 'message--other'}" data-message-id="${m.id}">
                            ${m.sender_id !== currentUser?.id ? `<strong>${m.username || 'Unknown'}</strong><br/>` : ''}
                            ${m.content}
                            <span class="message__time">${new Date(m.created_at).toLocaleTimeString()}</span>
                            ${canDelete ? `<button class="btn btn-red" style="padding:2px 8px;font-size:11px;margin-left:8px;" onclick="deleteMessage(${m.id})">🗑️</button>` : ''}
                        </div>
                    `;
                }).join('');
                msgsContainer.scrollTop = msgsContainer.scrollHeight;
            });

            document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });

            currentChatId = chatId;
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentChatId || !currentUser) return;

            const type = currentChatId.startsWith('city_') ? 'city' : 'private';
            const result = await sendMessage(currentChatId, text, type);

            if (result) {
                input.value = '';
                loadMessages(currentChatId).then(msgs => {
                    const msgsContainer = document.getElementById('chatMessages');
                    if (msgsContainer) {
                        msgsContainer.innerHTML = msgs.map(m => {
                            const canDelete = currentUser && (m.sender_id === currentUser.id || currentUser.isAdmin);
                            return `
                                <div class="message ${m.sender_id === currentUser?.id ? 'message--self' : 'message--other'}" data-message-id="${m.id}">
                                    ${m.sender_id !== currentUser?.id ? `<strong>${m.username || 'Unknown'}</strong><br/>` : ''}
                                    ${m.content}
                                    <span class="message__time">${new Date(m.created_at).toLocaleTimeString()}</span>
                                    ${canDelete ? `<button class="btn btn-red" style="padding:2px 8px;font-size:11px;margin-left:8px;" onclick="deleteMessage(${m.id})">🗑️</button>` : ''}
                                </div>
                            `;
                        }).join('');
                        msgsContainer.scrollTop = msgsContainer.scrollHeight;
                    }
                });
            }
        }

        function openCityChat(cityId) {
            const city = cities.find(c => c.id == cityId);
            if (!city) {
                alert('❌ Город не найден');
                return;
            }
            if (!city.members?.includes(currentUser?.id)) {
                alert('🔒 Вы не в городе!');
                return;
            }
            const chatId = `city_${cityId}`;
            renderChatWindow(chatId, city.name, 'city');
        }

        function openFriendChat(friendId) {
            const friend = friends.find(f => f.friend_id === friendId);
            if (!friend) return;
            const chatId = `private_${friendId}`;
            renderChatWindow(chatId, friend.username, 'private');
        }

        // ============================================================
        // ДРУЗЬЯ
        // ============================================================
        async function addFriend() {
            const query = prompt('👤 Введите имя пользователя для поиска:');
            if (!query || query.length < 2) return;

            try {
                const res = await fetch(`/api/users/search?q=${encodeURIComponent(query)}`);
                if (!res.ok) throw new Error('Ошибка поиска');
                const users = await res.json();

                if (users.length === 0) {
                    alert('❌ Пользователи не найдены');
                    return;
                }

                const list = users.map((u, i) => `${i + 1}. ${u.username} (${u.discord_id})`).join('\n');
                const choice = prompt(`Найденные пользователи:\n${list}\n\nВведите номер для добавления:`);
                if (!choice) return;

                const idx = parseInt(choice) - 1;
                if (idx < 0 || idx >= users.length) {
                    alert('❌ Неверный номер');
                    return;
                }

                const friendId = users[idx].discord_id;
                await apiPost('/api/friends', { friendId });

                await loadData();
                renderContent('friends');
                alert('✅ Друг добавлен!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        async function removeFriend(friendId) {
            if (!confirm('Удалить друга?')) return;
            try {
                await apiDelete(`/api/friends/${friendId}`);
                await loadData();
                renderContent('friends');
                alert('✅ Друг удалён!');
            } catch (e) {
                alert('❌ ' + e.message);
            }
        }

        // ============================================================
        // СТАТУС ДРУЗЕЙ (онлайн/офлайн)
        // ============================================================
        async function updateFriendsStatus() {
            try {
                const res = await fetch('/api/friends/status?_=' + Date.now(), {
                    headers: { 'Cache-Control': 'no-cache' }
                });
                if (!res.ok) return;
                
                const friendsData = await res.json();
                
                document.querySelectorAll('.friend-item').forEach(item => {
                    const friendId = item.dataset.friendId;
                    const friend = friendsData.find(f => f.friend_id === friendId);
                    if (friend) {
                        const statusEl = item.querySelector('.friend-status');
                        if (statusEl) {
                            statusEl.textContent = friend.online ? '🟢 онлайн' : '⚫ офлайн';
                            statusEl.style.color = friend.online ? '#00FF88' : '#666';
                        }
                    }
                });
            } catch (e) {
                console.warn('Ошибка обновления статуса друзей:', e);
            }
        }

        // ============================================================
        // МОДАЛКА
        // ============================================================
        let modalType = '';

        function openModal(type) {
            if (!currentUser) {
                alert('⛔ Требуется авторизация!');
                return;
            }
            modalType = type;
            document.getElementById('modalOverlay').classList.add('open');
            document.getElementById('modalTitle').textContent = type === 'city' ? '🏙️ Создать город' : '👥 Добавить друга';
            document.getElementById('modalLabel').textContent = type === 'city' ? 'Название города' : 'Discord ник';
            document.getElementById('modalInput').value = '';
            document.getElementById('modalInput').placeholder = type === 'city' ? 'Введите название...' : 'Введите ник...';
        }

        document.getElementById('modalCloseBtn').addEventListener('click', () => {
            document.getElementById('modalOverlay').classList.remove('open');
        });

        document.getElementById('modalSaveBtn').addEventListener('click', async () => {
            const input = document.getElementById('modalInput');
            const value = input.value.trim();
            if (!value) return alert('Заполните поле!');

            if (modalType === 'city') {
                try {
                    await apiPost('/api/cities', { name: value });
                    await loadData();
                    renderContent('cities');
                    alert('✅ Город создан!');
                } catch (e) {
                    alert('❌ ' + e.message);
                }
            } else {
                try {
                    const res = await fetch(`/api/users/search?q=${encodeURIComponent(value)}`);
                    if (!res.ok) throw new Error('Ошибка поиска');
                    const users = await res.json();

                    if (users.length === 0) {
                        alert('❌ Пользователи не найдены');
                        return;
                    }

                    const friendId = users[0].discord_id;
                    await apiPost('/api/friends', { friendId });
                    await loadData();
                    renderContent('friends');
                    alert('✅ Друг добавлен!');
                } catch (e) {
                    alert('❌ ' + e.message);
                }
            }

            document.getElementById('modalOverlay').classList.remove('open');
        });

        // ============================================================
        // ПЕРЕКЛЮЧЕНИЕ РАЗДЕЛОВ
        // ============================================================
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', function() {
                const section = this.dataset.section;
                if (section === 'cities' || section === 'friends' || section === 'chats') {
                    const wasOpen = this.classList.contains('active');
                    if (wasOpen && (section === 'cities' || section === 'friends')) {
                        document.getElementById('cityList').style.display = 'none';
                        document.getElementById('friendList').style.display = 'none';
                        this.classList.remove('active');
                        return;
                    }
                }
                currentSection = section;
                renderAll();
            });
        });

        // ============================================================
        // ЗАПУСК
        // ============================================================
        async function init() {
            await loadUser();
            await loadData();
            
            // Запускаем обновление статуса друзей
            if (document.getElementById('friendList')) {
                setTimeout(updateFriendsStatus, 1500);
                setInterval(updateFriendsStatus, 15000);
            }
        }

        init();
    </script>

    <script>
        // Подтягиваем аватар из Discord в хедер
        async function updateHeaderAvatar() {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    const user = await res.json();
                    const avatarUrl = user.avatar
                        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                        : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.id) % 5}.png`;
                    const headerImg = document.getElementById('headerAvatar');
                    if (headerImg) {
                        headerImg.src = avatarUrl;
                    }
                }
            } catch (e) {
                console.log('Не удалось загрузить аватар');
            }
        }

        document.addEventListener('DOMContentLoaded', updateHeaderAvatar);
    </script>

</body>
</html>
