<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Форум — Glow Vanilla</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        /* ===== ДОПОЛНИТЕЛЬНЫЕ СТИЛИ ДЛЯ ФОРУМА ===== */
        .forum-layout {
            display: flex;
            gap: 30px;
            padding: 40px 0;
            min-height: 70vh;
        }
        .forum-sidebar {
            width: 280px;
            flex-shrink: 0;
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            height: fit-content;
            max-height: 80vh;
            overflow-y: auto;
            position: sticky;
            top: 100px;
            padding: 12px 0;
        }
        .forum-sidebar::-webkit-scrollbar { width: 4px; }
        .forum-sidebar::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 20px;
            color: var(--gray);
            font-size: 15px;
            font-weight: 600;
            transition: 0.3s;
            cursor: pointer;
            border-left: 3px solid transparent;
        }
        .sidebar-item:hover {
            color: var(--white);
            background: rgba(255,255,255,0.04);
        }
        .sidebar-item.active {
            color: var(--green);
            border-left-color: var(--green);
            background: rgba(0,255,136,0.06);
        }
        .sidebar-item .icon { font-size: 20px; width: 28px; text-align: center; }
        .sidebar-item .badge {
            margin-left: auto;
            background: var(--purple);
            color: white;
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        .sidebar-divider {
            height: 1px;
            background: rgba(255,255,255,0.05);
            margin: 8px 20px;
        }
        .sub-list {
            padding-left: 20px;
        }
        .sub-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 8px 16px;
            color: var(--gray);
            font-size: 14px;
            transition: 0.3s;
            cursor: pointer;
            border-radius: 8px;
            margin: 2px 8px;
        }
        .sub-item:hover {
            color: var(--white);
            background: rgba(255,255,255,0.04);
        }
        .sub-item.active {
            color: var(--green);
            background: rgba(0,255,136,0.06);
        }
        .sub-item .sub-icon { font-size: 16px; width: 24px; text-align: center; }
        .sub-item .sub-badge {
            margin-left: auto;
            font-size: 12px;
            color: var(--gray);
        }
        .sub-action {
            padding: 6px 16px;
            margin: 4px 8px;
            background: transparent;
            border: 1px dashed rgba(255,255,255,0.15);
            border-radius: 8px;
            color: var(--gray);
            font-size: 13px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .sub-action:hover {
            border-color: var(--green);
            color: var(--green);
        }
        .forum-main {
            flex: 1;
            min-width: 0;
        }
        .forum-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 16px;
        }
        .forum-header__title {
            font-size: 28px;
            font-weight: 800;
            color: var(--white);
        }
        .forum-header__actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 14px;
        }
        .btn-green {
            background: var(--green);
            color: var(--bg);
        }
        .btn-green:hover {
            background: #00cc77;
            transform: scale(1.03);
        }
        .btn-purple {
            background: var(--purple);
            color: white;
        }
        .btn-purple:hover {
            background: #7c4de0;
            transform: scale(1.03);
        }
        .btn-red {
            background: #E94560;
            color: white;
        }
        .btn-red:hover {
            background: #c73b52;
        }
        .btn-gray {
            background: rgba(255,255,255,0.08);
            color: var(--gray);
        }
        .btn-gray:hover {
            background: rgba(255,255,255,0.15);
        }
        .post-card {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .post-card:hover { border-color: var(--purple); }
        .post-card__header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 10px;
        }
        .post-card__avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--purple);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: white;
            flex-shrink: 0;
        }
        .post-card__author { font-weight: 700; }
        .post-card__date {
            color: var(--gray);
            font-size: 13px;
            margin-left: auto;
        }
        .post-card__title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .post-card__text { color: var(--gray); font-size: 15px; line-height: 1.6; }
        .post-card__badge {
            background: var(--purple);
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            display: inline-block;
            margin-bottom: 8px;
        }
        .post-card__badge.news { background: #E94560; }
        .post-card__actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .chat-window {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            min-height: 500px;
            max-height: 70vh;
        }
        .chat-window__header {
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        .chat-window__header .status {
            font-size: 13px;
            font-weight: 400;
            color: var(--green);
        }
        .chat-window__messages {
            flex: 1;
            padding: 16px 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .chat-window__messages::-webkit-scrollbar { width: 4px; }
        .chat-window__messages::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 4px; }
        .message {
            max-width: 75%;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 14px;
            line-height: 1.5;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message--self {
            background: var(--green);
            color: var(--bg);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .message--other {
            background: rgba(255,255,255,0.08);
            color: var(--white);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }
        .message__time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 2px;
            display: block;
        }
        .message--self .message__time { text-align: right; }
        .message--other .message__time { text-align: left; }
        .chat-window__input {
            display: flex;
            gap: 12px;
            padding: 12px 20px;
            border-top: 1px solid rgba(255,255,255,0.05);
            flex-shrink: 0;
        }
        .chat-window__input input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg);
            color: var(--white);
            font-size: 14px;
            font-family: 'Inter', sans-serif;
        }
        .chat-window__input input:focus {
            outline: none;
            border-color: var(--green);
        }
        .chat-window__input button {
            padding: 10px 24px;
            border-radius: 12px;
            border: none;
            background: var(--green);
            color: var(--bg);
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .chat-window__input button:hover { background: #00cc77; }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }
        .empty-state .icon { font-size: 40px; margin-bottom: 8px; }
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(6px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .modal__title {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 20px;
            color: var(--white);
        }
        .modal__label {
            display: block;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--gray);
        }
        .modal__input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            background: var(--bg);
            color: var(--white);
            font-size: 15px;
            font-family: 'Inter', sans-serif;
        }
        .modal__input:focus {
            outline: none;
            border-color: var(--green);
        }
        .modal__actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
            justify-content: flex-end;
        }
        .modal__btn {
            padding: 10px 28px;
            border-radius: 12px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 15px;
        }
        .modal__btn-primary {
            background: var(--green);
            color: var(--bg);
        }
        .modal__btn-primary:hover { background: #00cc77; }
        .modal__btn-secondary {
            background: transparent;
            color: var(--gray);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .modal__btn-secondary:hover {
            background: rgba(255,255,255,0.05);
        }
        @media (max-width: 1024px) {
            .forum-layout { flex-direction: column; }
            .forum-sidebar {
                width: 100%;
                max-height: 300px;
                position: static;
            }
            .chat-window { max-height: 500px; min-height: 400px; }
        }
        @media (max-width: 600px) {
            .nav { gap: 16px; flex-wrap: wrap; justify-content: center; }
            .forum-header { flex-direction: column; align-items: stretch; }
            .forum-header__actions { flex-wrap: wrap; }
            .chat-window__input { flex-direction: column; }
            .chat-window__input button { width: 100%; }
            .message { max-width: 90%; }
        }
    </style>
</head>
<body>

    <!-- ===== ХЕДЕР ===== -->
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">GLOW VANILLA</a>
            <nav class="nav">
                <a href="index.html" class="nav__link">Главная</a>
                <a href="index.html#donate" class="nav__link">Донат</a>
                <a href="index.html#about" class="nav__link">О нас</a>
                <a href="forum.html" class="nav__link active">Форум</a>
            </nav>
            <a href="profile.html" class="profile-icon" title="Профиль">P</a>
        </div>
    </header>

    <!-- ===== ФОРУМ ===== -->
    <section style="padding-top: 20px;">
        <div class="container">
            <div class="forum-layout">

                <!-- ЛЕВАЯ ПАНЕЛЬ -->
                <aside class="forum-sidebar" id="sidebar">
                    <div class="sidebar-item active" data-section="news">
                        <span class="icon">📰</span> Новости
                    </div>

                    <div class="sidebar-item" data-section="cities">
                        <span class="icon">🏙️</span> Города
                        <span class="badge" id="cityBadge">0</span>
                    </div>
                    <div id="cityList" class="sub-list" style="display:none;">
                        <div class="sub-action" onclick="openModal('city')">➕ Создать город</div>
                    </div>

                    <div class="sidebar-item" data-section="general">
                        <span class="icon">💬</span> Общий форум
                    </div>

                    <div class="sidebar-item" data-section="friends">
                        <span class="icon">👥</span> Друзья
                        <span class="badge" id="friendBadge">0</span>
                    </div>
                    <div id="friendList" class="sub-list" style="display:none;">
                        <div class="sub-action" onclick="openModal('friend')">➕ Добавить друга</div>
                    </div>

                    <div class="sidebar-divider"></div>

                    <div class="sidebar-item" data-section="chats">
                        <span class="icon">💬</span> Чаты
                        <span class="badge" id="chatBadge">0</span>
                    </div>
                    <div id="chatList" class="sub-list" style="display:none;"></div>
                </aside>

                <!-- ОСНОВНАЯ ОБЛАСТЬ -->
                <main class="forum-main">
                    <div class="forum-header">
                        <h2 class="forum-header__title" id="sectionTitle">📰 Новости</h2>
                        <div class="forum-header__actions" id="sectionActions"></div>
                    </div>
                    <div id="sectionContent"></div>
                </main>

            </div>
        </div>
    </section>

    <!-- ===== МОДАЛКА ===== -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h3 class="modal__title" id="modalTitle">Создать</h3>
            <label class="modal__label" id="modalLabel">Имя</label>
            <input class="modal__input" id="modalInput" placeholder="Введите имя..." />
            <div class="modal__actions">
                <button class="modal__btn modal__btn-secondary" id="modalCloseBtn">Отмена</button>
                <button class="modal__btn modal__btn-primary" id="modalSaveBtn">Сохранить</button>
            </div>
        </div>
    </div>

    <!-- ===== ФУТЕР ===== -->
    <footer class="footer">
        <div class="container footer__inner">
            <p class="footer__ip">mc.glowvanilla.ru</p>
            <div class="footer__socials">
                <a href="https://discord.gg/glow-vanilla" target="_blank" class="footer__social">Discord</a>
            </div>
            <p class="footer__copy">© 2026 Glow Vanilla</p>
        </div>
    </footer>

    <script>
        // ===== ДАННЫЕ (локальные, пока без БД) =====
        const data = {
            news: [
                { author: 'Администрация', date: 'Сегодня', title: 'Обновление 2.0', text: 'Новые структуры и улучшения!' }
            ],
            general: [
                { author: 'CraftMaster', date: 'Вчера', title: 'Нашёл храм!', text: 'Координаты 1200 64 -500' }
            ],
            cities: [
                { 
                    id: 'city1', 
                    name: 'Новый Свет', 
                    owner: 'AlexMiner',
                    deputies: ['BuildPro'],
                    members: ['AlexMiner', 'BuildPro'],
                    requests: ['RedstoneKing']
                },
                { 
                    id: 'city2', 
                    name: 'Крепость', 
                    owner: 'CraftMaster',
                    deputies: [],
                    members: ['CraftMaster'],
                    requests: []
                }
            ],
            friends: [
                { id: 'friend1', name: 'AlexMiner', status: 'онлайн' },
                { id: 'friend2', name: 'BuildPro', status: 'онлайн' },
                { id: 'friend3', name: 'RedstoneKing', status: 'офлайн' }
            ],
            messages: {
                city1: [
                    { from: 'AlexMiner', text: 'Кто на стройке?', time: '14:00' }
                ],
                friend1: [
                    { from: 'AlexMiner', text: 'Привет!', time: '12:30' },
                    { from: 'me', text: 'Привет!', time: '12:32' }
                ]
            },
            myChats: ['city1', 'friend1'],
            myName: 'Игрок',
            adminName: 'Игрок'
        };

        let currentSection = 'news';
        let currentChatId = null;

        // ===== РЕНДЕРИНГ =====
        function renderAll() {
            renderSidebar();
            renderContent(currentSection);
        }

        function renderSidebar() {
            const cityList = document.getElementById('cityList');
            const cityBadge = document.getElementById('cityBadge');
            cityBadge.textContent = data.cities.length;
            cityList.innerHTML = `
                ${data.cities.map(c => `
                    <div class="sub-item" onclick="openCity('${c.id}')">
                        <span class="sub-icon">🏙️</span> ${c.name}
                        <span class="sub-badge">${c.members.length} 👥</span>
                    </div>
                `).join('')}
                <div class="sub-action" onclick="openModal('city')">➕ Создать город</div>
            `;

            const friendList = document.getElementById('friendList');
            const friendBadge = document.getElementById('friendBadge');
            friendBadge.textContent = data.friends.length;
            friendList.innerHTML = `
                ${data.friends.map(f => `
                    <div class="sub-item" onclick="openFriendChat('${f.id}')">
                        <span class="sub-icon">${f.status === 'онлайн' ? '🟢' : '⚫'}</span> ${f.name}
                        <span class="sub-badge">${f.status}</span>
                    </div>
                `).join('')}
                <div class="sub-action" onclick="openModal('friend')">➕ Добавить друга</div>
            `;

            const chatList = document.getElementById('chatList');
            const chatBadge = document.getElementById('chatBadge');
            const myChats = data.myChats || [];
            chatBadge.textContent = myChats.length;

            let chatHtml = '';
            myChats.forEach(id => {
                const city = data.cities.find(c => c.id === id);
                if (city) {
                    chatHtml += `
                        <div class="sub-item" onclick="openCityChat('${id}')">
                            <span class="sub-icon">🏙️</span> ${city.name} (город)
                        </div>
                    `;
                    return;
                }
                const friend = data.friends.find(f => f.id === id);
                if (friend) {
                    chatHtml += `
                        <div class="sub-item" onclick="openFriendChat('${id}')">
                            <span class="sub-icon">👤</span> ${friend.name}
                        </div>
                    `;
                }
            });
            chatList.innerHTML = chatHtml || '<div style="padding:8px 16px;color:var(--gray);font-size:13px;">Нет активных чатов</div>';

            document.querySelectorAll('.sidebar-item').forEach(el => {
                el.classList.toggle('active', el.dataset.section === currentSection);
            });

            document.getElementById('cityList').style.display = currentSection === 'cities' ? 'block' : 'none';
            document.getElementById('friendList').style.display = currentSection === 'friends' ? 'block' : 'none';
            document.getElementById('chatList').style.display = currentSection === 'chats' ? 'block' : 'none';
        }

        function renderContent(section) {
            const title = document.getElementById('sectionTitle');
            const container = document.getElementById('sectionContent');
            const actions = document.getElementById('sectionActions');

            const chatWindow = document.querySelector('.chat-window');
            if (chatWindow) chatWindow.remove();

            switch(section) {
                case 'news':
                    title.textContent = '📰 Новости';
                    if (data.myName === data.adminName) {
                        actions.innerHTML = `<button class="btn btn-green" onclick="createNews()">+ Создать новость</button>`;
                    } else {
                        actions.innerHTML = '';
                    }
                    container.innerHTML = data.news.map(p => `
                        <div class="post-card">
                            <div class="post-card__header">
                                <div class="post-card__avatar">${p.author.charAt(0)}</div>
                                <span class="post-card__author">${p.author}</span>
                                <span class="post-card__date">${p.date}</span>
                            </div>
                            <span class="post-card__badge news">Новость</span>
                            <div class="post-card__title">${p.title}</div>
                            <div class="post-card__text">${p.text}</div>
                        </div>
                    `).join('');
                    break;

                case 'general':
                    title.textContent = '💬 Общий форум';
                    actions.innerHTML = `<button class="btn btn-green" onclick="createGeneralPost()">+ Создать пост</button>`;
                    container.innerHTML = data.general.map(p => `
                        <div class="post-card">
                            <div class="post-card__header">
                                <div class="post-card__avatar">${p.author.charAt(0)}</div>
                                <span class="post-card__author">${p.author}</span>
                                <span class="post-card__date">${p.date}</span>
                            </div>
                            <span class="post-card__badge">Общее</span>
                            <div class="post-card__title">${p.title}</div>
                            <div class="post-card__text">${p.text}</div>
                        </div>
                    `).join('');
                    break;

                case 'cities':
                    title.textContent = '🏙️ Города';
                    actions.innerHTML = `<button class="btn btn-purple" onclick="openModal('city')">+ Создать город</button>`;
                    if (data.cities.length === 0) {
                        container.innerHTML = `<div class="empty-state"><div class="icon">🏙️</div>Городов пока нет</div>`;
                    } else {
                        container.innerHTML = data.cities.map(c => {
                            const isMember = c.members.includes(data.myName);
                            const hasRequest = c.requests && c.requests.includes(data.myName);
                            const isOwner = c.owner === data.myName;
                            const isDeputy = c.deputies && c.deputies.includes(data.myName);
                            const canManage = isOwner || isDeputy;

                            return `
                                <div class="post-card">
                                    <div class="post-card__header">
                                        <span style="font-size:24px;">🏙️</span>
                                        <span class="post-card__author">${c.name}</span>
                                        <span class="post-card__date">${c.members.length} участников</span>
                                    </div>
                                    <div style="color:var(--gray);font-size:14px;margin-bottom:8px;">
                                        👑 Владелец: ${c.owner} ${c.deputies && c.deputies.length ? `| ⚡ Замы: ${c.deputies.join(', ')}` : ''}
                                    </div>
                                    <div style="color:var(--gray);font-size:14px;margin-bottom:12px;">
                                        👥 ${c.members.join(', ') || 'нет участников'}
                                    </div>
                                    <div class="post-card__actions">
                                        ${isMember ? 
                                            `<button class="btn btn-green" onclick="openCityChat('${c.id}')">💬 Чат</button>` :
                                            hasRequest ?
                                                `<button class="btn btn-gray" disabled>⏳ Заявка отправлена</button>` :
                                                `<button class="btn btn-purple" onclick="sendRequest('${c.id}')">📩 Подать заявку</button>`
                                        }
                                        ${canManage && c.requests && c.requests.length > 0 ? `
                                            <button class="btn btn-green" onclick="manageRequests('${c.id}')">📩 Заявки (${c.requests.length})</button>
                                        ` : ''}
                                        ${isMember && !isOwner ? `
                                            <button class="btn btn-red" onclick="leaveCity('${c.id}')">🚪 Покинуть</button>
                                        ` : ''}
                                        ${isOwner ? `
                                            <button class="btn btn-red" onclick="deleteCity('${c.id}')">🗑️ Удалить город</button>
                                        ` : ''}
                                    </div>
                                </div>
                            `;
                        }).join('');
                    }
                    break;

                case 'friends':
                    title.textContent = '👥 Друзья';
                    actions.innerHTML = `<button class="btn btn-purple" onclick="openModal('friend')">+ Добавить друга</button>`;
                    container.innerHTML = data.friends.map(f => `
                        <div class="post-card" onclick="openFriendChat('${f.id}')" style="cursor:pointer;">
                            <div class="post-card__header">
                                <div class="post-card__avatar">${f.name.charAt(0)}</div>
                                <span class="post-card__author">${f.name}</span>
                                <span class="post-card__date">${f.status === 'онлайн' ? '🟢 онлайн' : '⚫ офлайн'}</span>
                            </div>
                        </div>
                    `).join('');
                    break;

                case 'chats':
                    title.textContent = '💬 Чаты';
                    actions.innerHTML = '';
                    const myChats = data.myChats || [];
                    if (myChats.length === 0) {
                        container.innerHTML = `<div class="empty-state"><div class="icon">💬</div>Нет активных чатов</div>`;
                    } else {
                        let html = '';
                        myChats.forEach(id => {
                            const city = data.cities.find(c => c.id === id);
                            if (city) {
                                html += `
                                    <div class="post-card" onclick="openCityChat('${id}')" style="cursor:pointer;">
                                        <div class="post-card__header">
                                            <span style="font-size:24px;">🏙️</span>
                                            <span class="post-card__author">${city.name}</span>
                                            <span class="post-card__date">городской чат</span>
                                        </div>
                                    </div>
                                `;
                                return;
                            }
                            const friend = data.friends.find(f => f.id === id);
                            if (friend) {
                                html += `
                                    <div class="post-card" onclick="openFriendChat('${id}')" style="cursor:pointer;">
                                        <div class="post-card__header">
                                            <div class="post-card__avatar">${friend.name.charAt(0)}</div>
                                            <span class="post-card__author">${friend.name}</span>
                                            <span class="post-card__date">личный чат</span>
                                        </div>
                                    </div>
                                `;
                            }
                        });
                        container.innerHTML = html;
                    }
                    break;
            }
        }

        // ===== СОЗДАНИЕ НОВОСТИ =====
        function createNews() {
            if (data.myName !== data.adminName) {
                alert('⛔ Только администратор может создавать новости!');
                return;
            }
            const title = prompt('📰 Заголовок новости:');
            if (!title) return;
            const text = prompt('📝 Текст новости:');
            if (!text) return;
            
            data.news.unshift({ 
                author: 'Администрация', 
                date: 'Только что', 
                title: title, 
                text: text 
            });
            renderContent('news');
            renderSidebar();
            alert('✅ Новость создана!');
        }

        // ===== УДАЛЕНИЕ ГОРОДА =====
        function deleteCity(id) {
            const city = data.cities.find(c => c.id === id);
            if (!city) return;
            if (city.owner !== data.myName) {
                alert('👑 Только владелец может удалить город!');
                return;
            }
            if (!confirm(`🗑️ Удалить город "${city.name}"? Это действие нельзя отменить!`)) return;
            
            data.cities = data.cities.filter(c => c.id !== id);
            delete data.messages[id];
            data.myChats = data.myChats.filter(c => c !== id);
            
            renderAll();
            alert(`✅ Город "${city.name}" удалён!`);
        }

        // ===== ЗАЯВКИ В ГОРОД =====
        function sendRequest(cityId) {
            const city = data.cities.find(c => c.id === cityId);
            if (!city) return;
            if (!city.requests) city.requests = [];
            if (city.requests.includes(data.myName)) return alert('Заявка уже отправлена!');
            city.requests.push(data.myName);
            renderContent('cities');
            renderSidebar();
            alert('✅ Заявка отправлена! Ожидайте решения владельца.');
        }

        function manageRequests(cityId) {
            const city = data.cities.find(c => c.id === cityId);
            if (!city || !city.requests || city.requests.length === 0) return alert('Нет заявок');

            const list = city.requests.map((name, i) => 
                `${i+1}. ${name}`
            ).join('\n');

            const choice = prompt(`Заявки в город "${city.name}":\n\n${list}\n\nВведите номер для принятия или "отклонить N" для отклонения:`);
            if (!choice) return;

            if (choice.startsWith('отклонить')) {
                const num = parseInt(choice.split(' ')[1]) - 1;
                if (num >= 0 && num < city.requests.length) {
                    city.requests.splice(num, 1);
                    renderContent('cities');
                    renderSidebar();
                    alert('❌ Заявка отклонена');
                }
                return;
            }

            const num = parseInt(choice) - 1;
            if (num >= 0 && num < city.requests.length) {
                const name = city.requests[num];
                city.requests.splice(num, 1);
                if (!city.members.includes(name)) city.members.push(name);
                if (!data.myChats.includes(cityId)) data.myChats.push(cityId);
                renderContent('cities');
                renderSidebar();
                alert(`✅ ${name} принят в город!`);
            }
        }

        // ===== ПОКИНУТЬ ГОРОД =====
        function leaveCity(id) {
            if (!confirm('Покинуть город?')) return;
            const city = data.cities.find(c => c.id === id);
            if (!city) return;
            if (city.owner === data.myName) return alert('👑 Владелец не может покинуть город!');
            city.members = city.members.filter(m => m !== data.myName);
            data.myChats = data.myChats.filter(c => c !== id);
            renderContent('cities');
            renderSidebar();
        }

        // ===== ОТКРЫТИЕ ГОРОДА =====
        function openCity(id) {
            currentSection = 'cities';
            renderAll();
            setTimeout(() => {
                const cards = document.querySelectorAll('.post-card');
                const city = data.cities.find(c => c.id === id);
                if (city) {
                    const idx = data.cities.indexOf(city);
                    if (cards[idx]) cards[idx].scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }, 100);
        }

        // ===== ЧАТЫ =====
        function renderChat(chatId, name, type) {
            currentChatId = chatId;
            const container = document.getElementById('sectionContent');
            const title = document.getElementById('sectionTitle');
            const actions = document.getElementById('sectionActions');

            actions.innerHTML = '';

            const city = data.cities.find(c => c.id === chatId);
            if (city && !city.members.includes(data.myName)) {
                container.innerHTML = `<div class="empty-state"><div class="icon">🔒</div>Вы не в городе</div>`;
                return;
            }

            const msgs = data.messages[chatId] || [];

            container.innerHTML = `
                <div class="chat-window">
                    <div class="chat-window__header">
                        <span>💬 ${name}</span>
                        <span class="status">${type === 'city' ? 'городской чат' : 'личный чат'}</span>
                        ${type === 'city' ? `<button class="btn btn-red" style="margin-left:auto;padding:4px 12px;font-size:12px;" onclick="leaveCity('${chatId}')">🚪 Покинуть</button>` : ''}
                    </div>
                    <div class="chat-window__messages" id="chatMessages">
                        ${msgs.length === 0 ? '<div class="empty-state">Напишите первое сообщение!</div>' :
                            msgs.map(m => `
                                <div class="message ${m.from === 'me' ? 'message--self' : 'message--other'}">
                                    ${m.from !== 'me' ? `<strong>${m.from}</strong><br/>` : ''}
                                    ${m.text}
                                    <span class="message__time">${m.time}</span>
                                </div>
                            `).join('')
                        }
                    </div>
                    <div class="chat-window__input">
                        <input id="chatInput" placeholder="Введите сообщение..." />
                        <button onclick="sendChatMessage()">Отправить</button>
                    </div>
                </div>
            `;

            const msgsContainer = document.getElementById('chatMessages');
            if (msgsContainer) msgsContainer.scrollTop = msgsContainer.scrollHeight;

            document.getElementById('chatInput')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendChatMessage();
            });

            title.textContent = `💬 ${name}`;
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text || !currentChatId) return;

            const now = new Date();
            const time = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

            if (!data.messages[currentChatId]) data.messages[currentChatId] = [];
            data.messages[currentChatId].push({ from: 'me', text, time });

            input.value = '';
            renderChat(currentChatId, getChatName(currentChatId), getChatType(currentChatId));
            renderSidebar();
        }

        function getChatName(id) {
            const city = data.cities.find(c => c.id === id);
            if (city) return city.name;
            const friend = data.friends.find(f => f.id === id);
            return friend ? friend.name : 'Чат';
        }

        function getChatType(id) {
            const city = data.cities.find(c => c.id === id);
            return city ? 'city' : 'friend';
        }

        function openCityChat(id) {
            const city = data.cities.find(c => c.id === id);
            if (!city) return;
            if (!city.members.includes(data.myName)) {
                alert('🔒 Вы не в городе!');
                return;
            }
            if (!data.myChats.includes(id)) data.myChats.push(id);
            renderChat(id, city.name, 'city');
            renderSidebar();
        }

        function openFriendChat(id) {
            const friend = data.friends.find(f => f.id === id);
            if (!friend) return;
            if (!data.myChats.includes(id)) data.myChats.push(id);
            renderChat(id, friend.name, 'friend');
            renderSidebar();
        }

        // ===== СОЗДАНИЕ ПОСТОВ =====
        function createGeneralPost() {
            const title = prompt('Заголовок:');
            if (!title) return;
            const text = prompt('Текст:');
            if (!text) return;
            data.general.unshift({ author: data.myName, date: 'Только что', title, text });
            renderContent('general');
            renderSidebar();
        }

        // ===== МОДАЛКА =====
        let modalType = '';

        function openModal(type) {
            modalType = type;
            document.getElementById('modalOverlay').classList.add('open');
            document.getElementById('modalTitle').textContent = type === 'city' ? '🏙️ Создать город' : '👥 Добавить друга';
            document.getElementById('modalLabel').textContent = type === 'city' ? 'Название города' : 'Discord ник';
            document.getElementById('modalInput').value = '';
            document.getElementById('modalInput').placeholder = type === 'city' ? 'Введите название...' : 'Введите ник...';
        }

        document.getElementById('modalCloseBtn').addEventListener('click', () => {
            document.getElementById('modalOverlay').classList.remove('open');
        });

        document.getElementById('modalSaveBtn').addEventListener('click', () => {
            const input = document.getElementById('modalInput');
            const value = input.value.trim();
            if (!value) return alert('Заполните поле!');

            if (modalType === 'city') {
                const id = 'city_' + Date.now();
                data.cities.push({ 
                    id, 
                    name: value, 
                    owner: data.myName,
                    deputies: [],
                    members: [data.myName],
                    requests: []
                });
                data.messages[id] = [];
                data.myChats.push(id);
            } else {
                const id = 'friend_' + Date.now();
                data.friends.push({ id, name: value, status: 'онлайн' });
                data.messages[id] = [];
            }

            document.getElementById('modalOverlay').classList.remove('open');
            renderAll();
        });

        // ===== ПЕРЕКЛЮЧЕНИЕ РАЗДЕЛОВ =====
        document.querySelectorAll('.sidebar-item').forEach(item => {
            item.addEventListener('click', function() {
                const section = this.dataset.section;
                if (section === 'cities' || section === 'friends' || section === 'chats') {
                    const wasOpen = this.classList.contains('active');
                    if (wasOpen && (section === 'cities' || section === 'friends')) {
                        document.getElementById('cityList').style.display = 'none';
                        document.getElementById('friendList').style.display = 'none';
                        this.classList.remove('active');
                        return;
                    }
                }
                currentSection = section;
                renderAll();
            });
        });

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        renderAll();
    </script>

</body>
</html>
