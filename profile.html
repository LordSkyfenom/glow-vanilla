<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Профиль — Glow Vanilla</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
    <style>
        .profile-section {
            padding: 40px 0;
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .profile-card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.05);
            text-align: center;
        }
        .profile-card__avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid var(--purple);
            margin-bottom: 16px;
        }
        .profile-card__name {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        .profile-card__id {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 16px;
        }
        .profile-card__role {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 24px;
        }
        .profile-card__role.admin {
            background: var(--green);
            color: var(--bg);
        }
        .profile-card__role.user {
            background: var(--purple);
            color: white;
        }
        .profile-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        .profile-stats__item {
            background: var(--bg);
            padding: 16px;
            border-radius: 12px;
        }
        .profile-stats__number {
            font-size: 28px;
            font-weight: 800;
            color: var(--green);
        }
        .profile-stats__label {
            font-size: 13px;
            color: var(--gray);
        }
        .bank-card {
            background: linear-gradient(135deg, #1a1a3e, #0B0B1A);
            padding: 24px;
            border-radius: 16px;
            text-align: left;
            border: 1px solid rgba(255,255,255,0.08);
        }
        .bank-card__top {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--gray);
            margin-bottom: 16px;
        }
        .bank-card__type {
            color: var(--gold);
        }
        .bank-card__number {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
            font-family: monospace;
            margin-bottom: 16px;
        }
        .bank-card__bottom {
            display: flex;
            justify-content: space-between;
            font-size: 16px;
        }
        .bank-card__balance {
            font-weight: 700;
            color: var(--gold);
        }
        .bank-card__balance.loading {
            color: var(--gray);
            font-weight: 400;
        }
        .profile-actions {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            justify-content: center;
            flex-wrap: wrap;
        }
        .btn-logout {
            background: #E94560;
            color: white;
        }
        .btn-logout:hover {
            background: #c73b52;
        }
        .btn-discord {
            background: #5865F2;
            color: white;
        }
        .btn-discord:hover {
            background: #4752c4;
        }
        @media (max-width: 768px) {
            .profile-card {
                padding: 20px;
                border-radius: 16px;
                margin: 0 10px;
            }
            .profile-card__avatar {
                width: 80px;
                height: 80px;
            }
            .profile-card__name {
                font-size: 22px;
            }
            .profile-card__id {
                font-size: 12px;
            }
            .profile-stats {
                grid-template-columns: 1fr;
                gap: 10px;
            }
            .profile-stats__number {
                font-size: 22px;
            }
            .profile-stats__label {
                font-size: 12px;
            }
            .bank-card {
                padding: 16px;
            }
            .bank-card__number {
                font-size: 16px;
                letter-spacing: 1px;
            }
            .bank-card__bottom {
                font-size: 14px;
                flex-direction: column;
                gap: 4px;
            }
            .profile-actions {
                flex-direction: column;
                gap: 8px;
            }
            .profile-actions .btn {
                width: 100%;
                text-align: center;
                padding: 10px;
                font-size: 14px;
            }
        }
        @media (max-width: 480px) {
            .profile-card {
                padding: 16px;
            }
            .profile-card__avatar {
                width: 64px;
                height: 64px;
            }
            .profile-card__name {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ХЕДЕР ===== -->
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">GLOW VANILLA</a>
            <nav class="nav">
                <a href="index.html" class="nav__link">Главная</a>
                <a href="index.html#donate" class="nav__link">Донат</a>
                <a href="index.html#about" class="nav__link">О нас</a>
                <a href="forum.html" class="nav__link">Форум</a>
            </nav>
            <a href="profile.html" class="profile-icon active-profile" title="Профиль">
                <img src="assets/images/default-avatar.png" alt="Профиль" id="headerAvatar" />
            </a>
        </div>
    </header>

    <!-- ===== ПРОФИЛЬ ===== -->
    <section class="profile-section">
        <div class="container" style="max-width: 600px; margin: 0 auto; padding: 0 20px;">
            <div id="profileContent">
                <div style="text-align:center; padding:40px; color:var(--gray);">
                    <div style="font-size:40px; margin-bottom:12px;">⏳</div>
                    Загрузка профиля...
                </div>
            </div>
        </div>
    </section>

    <!-- ===== ФУТЕР ===== -->
    <footer class="footer">
        <div class="container footer__inner">
            <p class="footer__ip">mc.glowvanilla.ru</p>
            <div class="footer__socials">
                <a href="https://discord.gg/glow-vanilla" target="_blank" class="footer__social">Discord</a>
            </div>
            <p class="footer__copy">© 2026 Glow Vanilla</p>
        </div>
    </footer>

    <script>
        // ============================================================
        // СЕКРЕТ (должен совпадать с SECRET_KEY на сервере)
        // ============================================================
        const SECRET_KEY = 'JEBWG6627JekwkavJwkq';

        // ============================================================
        // ЗАГРУЗКА ПРОФИЛЯ
        // ============================================================
        async function loadProfile() {
            const container = document.getElementById('profileContent');

            try {
                // 1. Получаем пользователя
                const meRes = await fetch('/api/me');
                if (!meRes.ok) {
                    container.innerHTML = `
                        <div class="profile-card" style="text-align:center; padding:40px;">
                            <div style="font-size:48px; margin-bottom:16px;">🔐</div>
                            <h3 style="margin-bottom:12px;">Вы не авторизованы</h3>
                            <p style="color:var(--gray); margin-bottom:24px;">Войдите через Discord, чтобы увидеть профиль</p>
                            <a href="/auth/discord" class="btn btn-discord">Войти через Discord</a>
                        </div>
                    `;
                    return;
                }

                const user = await meRes.json();

                // 2. Получаем статистику (посты, города, друзья)
                const statsRes = await fetch(`/api/user/stats/${user.id}`);
                const stats = statsRes.ok ? await statsRes.json() : { posts: 0, cities: 0, friends: 0 };

                // 3. Получаем РЕАЛЬНЫЙ БАЛАНС из банковской системы (по UUID)
                let balance = 0;
                try {
                    // Получаем UUID пользователя из таблицы users
                    const userRes = await fetch(`/api/users/${user.id}`);
                    let uuid = null;
                    if (userRes.ok) {
                        const userData = await userRes.json();
                        uuid = userData.minecraft_uuid;
                    }
                    
                    // Если UUID есть — ищем баланс по нему
                    if (uuid) {
                        const bankRes = await fetch(`/api/bank/balance/${uuid}?secret=${SECRET_KEY}`);
                        if (bankRes.ok) {
                            const bankData = await bankRes.json();
                            balance = bankData.balance || 0;
                        }
                    } else {
                        // Если UUID нет — пробуем по Discord ID (как запасной вариант)
                        const bankRes = await fetch(`/api/bank/balance/${user.id}?secret=${SECRET_KEY}`);
                        if (bankRes.ok) {
                            const bankData = await bankRes.json();
                            balance = bankData.balance || 0;
                        }
                    }
                } catch (e) {
                    console.warn('Не удалось загрузить баланс:', e);
                }

                // 4. Обновляем аватар в хедере
                const avatarUrl = user.avatar
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                    : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.id) % 5}.png`;
                document.getElementById('headerAvatar').src = avatarUrl;

                // 5. Роль
                const isAdmin = user.isAdmin || false;
                const roleClass = isAdmin ? 'admin' : 'user';
                const roleText = isAdmin ? '👑 Администратор' : '🎮 Игрок';

                // 6. Рендерим профиль
                container.innerHTML = `
                    <div class="profile-card">
                        <img class="profile-card__avatar" src="${avatarUrl}" alt="Аватар" />
                        <h2 class="profile-card__name">${user.username}</h2>
                        <div class="profile-card__id">🆔 ${user.id}</div>
                        <div class="profile-card__role ${roleClass}">${roleText}</div>

                        <div class="profile-stats">
                            <div class="profile-stats__item">
                                <div class="profile-stats__number">${stats.posts || 0}</div>
                                <div class="profile-stats__label">📝 Постов</div>
                            </div>
                            <div class="profile-stats__item">
                                <div class="profile-stats__number">${stats.cities || 0}</div>
                                <div class="profile-stats__label">🏙️ Городов</div>
                            </div>
                            <div class="profile-stats__item">
                                <div class="profile-stats__number">${stats.friends || 0}</div>
                                <div class="profile-stats__label">👥 Друзей</div>
                            </div>
                        </div>

                        <!-- ===== БАНКОВСКАЯ КАРТА С РЕАЛЬНЫМ БАЛАНСОМ ===== -->
                        <div class="bank-card">
                            <div class="bank-card__top">
                                <span class="bank-card__label">💳 Банковская карта</span>
                                <span class="bank-card__type">💎 АР</span>
                            </div>
                            <div class="bank-card__number">•••• •••• •••• ${user.id.slice(-4)}</div>
                            <div class="bank-card__bottom">
                                <span class="bank-card__name">${user.username}</span>
                                <span class="bank-card__balance">${balance} АР</span>
                            </div>
                        </div>

                        <div class="profile-actions">
                            <a href="/auth/logout" class="btn btn-logout">🚪 Выйти</a>
                            <a href="/forum.html" class="btn btn-primary">💬 Перейти в форум</a>
                        </div>
                    </div>
                `;

            } catch (e) {
                console.error('Ошибка загрузки профиля:', e);
                container.innerHTML = `
                    <div class="profile-card" style="text-align:center; padding:40px;">
                        <div style="font-size:48px; margin-bottom:16px;">❌</div>
                        <h3>Ошибка загрузки профиля</h3>
                        <p style="color:var(--gray);">Попробуйте обновить страницу</p>
                    </div>
                `;
            }
        }

        // ============================================================
        // АВАТАР В ХЕДЕРЕ (дополнительно)
        // ============================================================
        async function updateHeaderAvatar() {
            try {
                const res = await fetch('/api/me');
                if (res.ok) {
                    const user = await res.json();
                    const avatarUrl = user.avatar
                        ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                        : `https://cdn.discordapp.com/embed/avatars/${parseInt(user.id) % 5}.png`;
                    const headerImg = document.getElementById('headerAvatar');
                    if (headerImg) {
                        headerImg.src = avatarUrl;
                    }
                }
            } catch (e) {
                console.log('Не удалось загрузить аватар');
            }
        }

        // ============================================================
        // ЗАПУСК
        // ============================================================
        document.addEventListener('DOMContentLoaded', () => {
            loadProfile();
            updateHeaderAvatar();
        });
    </script>

</body>
</html>
