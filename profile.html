<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Профиль — Glow Vanilla</title>
    <link rel="stylesheet" href="style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
</head>
<body>

    <!-- ===== ХЕДЕР ===== -->
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">GLOW VANILLA</a>
            <nav class="nav">
                <a href="index.html" class="nav__link">Главная</a>
                <a href="index.html#donate" class="nav__link">Донат</a>
                <a href="index.html#about" class="nav__link">О нас</a>
                <a href="forum.html" class="nav__link">Форум</a>
            </nav>
            <a href="profile.html" class="profile-icon active-profile" title="Профиль">
                <img src="assets/images/default-avatar.png" alt="Профиль" />
            </a>
        </div>
    </header>

    <!-- ===== ПРОФИЛЬ ===== -->
    <section class="section profile-section">
        <div class="container">
            <div class="profile-card">
                <img src="assets/images/default-avatar.png" alt="Аватар" class="profile-card__avatar" />
                <h2 class="profile-card__name">Player_Glow</h2>
                <p class="profile-card__role">Спонсор</p>
                <div class="profile-card__stats">
                    <div><span>Убийств:</span> 142</div>
                    <div><span>Смертей:</span> 87</div>
                    <div><span>Время:</span> 124 ч</div>
                </div>
                <!-- Банковская карта -->
                <div class="bank-card">
                    <div class="bank-card__top">
                        <span class="bank-card__label">Банковская карта</span>
                        <span class="bank-card__type">💎 АР</span>
                    </div>
                    <div class="bank-card__number">1234 5678 9012 3456</div>
                    <div class="bank-card__bottom">
                        <span class="bank-card__name">Основной счёт</span>
                        <span class="bank-card__balance">1 250 АР</span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- ===== ФУТЕР ===== -->
    <footer class="footer">
        <div class="container footer__inner">
            <p class="footer__ip">mc.glowvanilla.ru</p>
            <div class="footer__socials">
                <a href="https://discord.gg/glow-vanilla" target="_blank" class="footer__social">Discord</a>
            </div>
            <p class="footer__copy">© 2026 Glow Vanilla</p>
        </div>
    </footer>

</body>
</html>
